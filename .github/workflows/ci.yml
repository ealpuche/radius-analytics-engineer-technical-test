name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Instalar dependencias de desarrollo
        run: pip install -r requirements-dev.txt

      - name: ruff check
        run: ruff check .

      - name: ruff format (check)
        run: ruff format --check .

      - name: pytest con cobertura
        run: pytest tests/ --cov=src/mercado --cov-report=term-missing

  dbt-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Instalar dbt
        run: pip install dbt-core==1.8.4 dbt-duckdb==1.8.1

      - name: Configurar perfil dbt
        run: mkdir -p ~/.dbt && cp profiles.yml ~/.dbt/profiles.yml

      - name: Preparar directorio warehouse
        run: mkdir -p data/warehouse

      - name: dbt deps
        working-directory: dbt_project/mercado
        run: dbt deps

      - name: dbt parse
        working-directory: dbt_project/mercado
        run: dbt parse

      - name: dbt compile
        working-directory: dbt_project/mercado
        run: dbt compile
