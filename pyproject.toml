[tool.ruff]
line-length = 100
target-version = "py311"
src = ["src", "tests"]
extend-exclude = [
    "notebooks/00_bienvenida_verificacion.ipynb",
]

[tool.ruff.lint]
select = ["E", "F", "I", "N", "UP", "B", "SIM", "RUF", "PL", "PD"]
ignore = ["PD901"]

[tool.ruff.format]
quote-style = "single"
docstring-code-format = true

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --strict-markers --tb=short"
pythonpath = ["src"]
filterwarnings = ["ignore::DeprecationWarning"]

[tool.coverage.run]
source = ["src/mercado"]
omit = ["*/__init__.py", "*/spark/*"]

[tool.coverage.report]
show_missing = true
skip_empty = true
fail_under = 70
