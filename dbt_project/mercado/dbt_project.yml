name: 'mercado'
version: '1.0.0'
config-version: 2

profile: 'mercado'

model-paths: ["models"]
seed-paths:  ["seeds"]
test-paths:  ["tests"]
macro-paths: ["macros"]

target-path: "target"
clean-targets: ["target", "dbt_packages"]

# ── Variables de negocio configurables ───────────────────────────────────────
# Modifica estos valores aquí o pásalos en tiempo de ejecución:
#   dbt run --vars '{"plazo_devolucion_dias": 15}'
vars:
  plazo_devolucion_dias:          30
  ventana_cliente_activo_meses:   12
  umbral_recompra_dias:           7

# ── Configuración de materializaciones por capa ───────────────────────────────
models:
  mercado:
    staging:
      +materialized: view
      +schema: staging

    intermediate:
      +materialized: view
      +schema: intermediate

    marts:
      +materialized: table
      +schema: marts
